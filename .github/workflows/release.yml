name: release

# Release solo por tag de versión (p. ej. v0.1.0). Construye el APK de release
# de Android firmado con el keystore de release y publica un GitHub Release con
# el artefacto.
#
# Corre en el runner self-hosted (VPS2): el toolchain (JDK 17, Flutter, Android
# SDK) está pre-provisionado en la máquina, por lo que no se descarga nada por
# run y no se consumen minutos de GitHub-hosted.
on:
  push:
    tags: ['v*']

permissions:
  contents: write # crear el GitHub Release y subir el APK

jobs:
  release-android:
    runs-on: [self-hosted, vps2]
    steps:
      - uses: actions/checkout@v5

      # El toolchain vive en la máquina; solo lo exponemos al job.
      - name: Setup toolchain on PATH
        run: |
          echo "/opt/flutter/bin" >> "$GITHUB_PATH"
          echo "/opt/android-sdk/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "/opt/android-sdk/platform-tools" >> "$GITHUB_PATH"
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=/opt/android-sdk" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=/opt/android-sdk" >> "$GITHUB_ENV"

      - name: Verify Dart/Flutter
        run: flutter --version

      # google-services.json está gitignored (no se versiona); se inyecta desde
      # un secret base64 para que el plugin google-services pueda construir.
      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error::Falta el secret GOOGLE_SERVICES_JSON (requerido para el build Android con Firebase)."
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON" | base64 -d > "$GITHUB_WORKSPACE/android/app/google-services.json"

      # El keystore de release y sus contraseñas viven en repo Secrets (cifrados,
      # enmascarados en logs, inyectados solo en jobs de este repo). Se decodifican
      # al workspace efímero del job; el step de limpieza los borra al final.
      - name: Restore release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::Falta el secret ANDROID_KEYSTORE_BASE64 (firma de release)."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/android/app/upload-keystore.jks"
          {
            echo "storeFile=$GITHUB_WORKSPACE/android/app/upload-keystore.jks"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
          } > "$GITHUB_WORKSPACE/android/key.properties"

      - name: Pub get
        run: flutter pub get

      - name: Generate code (drift / build_runner)
        run: dart run build_runner build

      # versionName desde el tag (v0.1.0 -> 0.1.0); versionCode desde el nº de run.
      - name: Build release APK
        run: |
          flutter build apk --release \
            --build-name="${GITHUB_REF_NAME#v}" \
            --build-number="${{ github.run_number }}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # gh sube el asset con el nombre del archivo tal cual y no permite
          # renombrarlo; se copia con el nombre de descarga (lleva la versión
          # del tag, p. ej. ataulfo-v0.29.0.apk) antes de crear el release.
          apk="ataulfo-${GITHUB_REF_NAME}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "$apk"
          gh release create "${GITHUB_REF_NAME}" \
            "$apk" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes

      # El workspace del runner self-hosted persiste entre runs: borramos el
      # material de firma para no dejarlo en disco en una caja compartida.
      - name: Cleanup signing material from workspace
        if: always()
        run: |
          rm -f "$GITHUB_WORKSPACE/android/app/upload-keystore.jks" \
                "$GITHUB_WORKSPACE/android/key.properties" \
                "$GITHUB_WORKSPACE/android/app/google-services.json" \
                "$GITHUB_WORKSPACE"/ataulfo-*.apk

  # Build de escritorio Linux (x64), empaquetado y adjuntado AL MISMO release.
  # Depende de release-android: así el GitHub Release ya existe y este job solo
  # sube su artefacto (gh release upload) en vez de competir por crearlo. Si el
  # build Linux falla, el APK ya quedó publicado — no se bloquea mutuamente.
  release-linux:
    needs: release-android
    runs-on: [self-hosted, vps2]
    steps:
      - uses: actions/checkout@v5

      # Solo Flutter en PATH: el desktop build no necesita Android SDK/JDK ni
      # material de firma. El toolchain nativo (clang, cmake, ninja, GTK-3,
      # libsecret) está pre-provisionado en VPS2, igual que Flutter/Android.
      - name: Setup Flutter on PATH
        run: echo "/opt/flutter/bin" >> "$GITHUB_PATH"

      - name: Verify Dart/Flutter
        run: flutter --version

      # Idempotente: asegura el target linux-desktop por si la config global del
      # runner no lo tuviera habilitado. No descarga nada si ya está activo.
      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Pub get
        run: flutter pub get

      - name: Generate code (drift / build_runner)
        run: dart run build_runner build

      # versionName desde el tag (v0.2.0 -> 0.2.0), consistente con el APK.
      - name: Build release Linux
        run: |
          flutter build linux --release \
            --build-name="${GITHUB_REF_NAME#v}"

      # tar.gz del bundle ejecutable (binario + data/ + lib/). El nombre lleva
      # versión y arquitectura para distinguir descargas del release.
      - name: Package Linux bundle
        run: |
          ver="${GITHUB_REF_NAME#v}"
          tar -czf "ataulfo-${ver}-linux-x64.tar.gz" \
            -C build/linux/x64/release bundle
          ls -lh "ataulfo-${ver}-linux-x64.tar.gz"
          sha256sum "ataulfo-${ver}-linux-x64.tar.gz"

      - name: Upload Linux artifact to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ver="${GITHUB_REF_NAME#v}"
          gh release upload "${GITHUB_REF_NAME}" \
            "ataulfo-${ver}-linux-x64.tar.gz" --clobber

      # Higiene en la caja compartida: el tarball no es sensible, pero no lo
      # dejamos acumulándose en el workspace persistente del runner.
      - name: Cleanup artifact from workspace
        if: always()
        run: rm -f "$GITHUB_WORKSPACE"/ataulfo-*-linux-x64.tar.gz
