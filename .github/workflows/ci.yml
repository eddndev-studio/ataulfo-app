name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    env:
      # GitHub deprecó Node.js 20 en sep/2025; jun/2026 lo fuerza a Node 24.
      # Algunas actions (p. ej. actions/upload-artifact@v5) todavía declaran
      # Node 20 en su action.yml — este flag las obliga a correr en Node 24
      # ya, sin esperar a la migración upstream.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: stable
          cache: true

      - name: Verify Dart/Flutter
        run: flutter --version

      - name: Pub get
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Test
        run: flutter test --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage
          path: coverage/lcov.info
          if-no-files-found: ignore
