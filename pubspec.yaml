name: agentic
description: "Cliente Flutter (OWNER/ADMIN, Android-first) de la plataforma Agentic."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.4

dependencies:
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_secure_storage: ^10.3.0
  go_router: ^17.2.3
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-VariableFont.ttf
        - asset: assets/fonts/DMSans-Italic-VariableFont.ttf
          style: italic
