name: ataulfo
description: "Cliente Flutter (OWNER/ADMIN, Android-first) de la plataforma Ataúlfo."
publish_to: 'none'
version: 0.2.0+3

environment:
  sdk: ^3.10.4

dependencies:
  dio: ^5.9.2
  file_picker: ^10.3.4
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_local_notifications: ^21.0.0
  flutter_secure_storage: ^10.3.0
  go_router: ^17.2.3
  path_provider: ^2.1.5
  qr_flutter: ^4.1.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.5
  fake_async: ^1.3.1
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-VariableFont.ttf
        - asset: assets/fonts/DMSans-Italic-VariableFont.ttf
          style: italic
