name: ataulfo
description: "Cliente Flutter (OWNER/ADMIN, Android-first) de la plataforma Ataúlfo."
publish_to: 'none'
version: 0.26.0+50

environment:
  sdk: ^3.12.0

dependencies:
  connectivity_plus: ^7.2.0
  dio: ^5.9.2
  drift: ^2.34.0
  file_picker: ^10.3.4
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_local_notifications: ^21.0.0
  flutter_markdown_plus: ^1.0.7
  flutter_secure_storage: ^10.3.0
  go_router: ^17.2.3
  just_audio: ^0.10.5
  open_filex: ^4.7.0
  package_info_plus: ^9.0.1
  path_provider: ^2.1.5
  qr_flutter: ^4.1.0
  record: ^7.1.1
  share_plus: ^12.0.2
  sqlite3_flutter_libs: ^0.6.0+eol
  url_launcher: ^6.3.2
  uuid: ^4.5.3
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  drift_dev: ^2.34.0
  build_runner: ^2.4.0
  mocktail: ^1.0.5
  fake_async: ^1.3.1
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-VariableFont.ttf
        - asset: assets/fonts/DMSans-Italic-VariableFont.ttf
          style: italic
